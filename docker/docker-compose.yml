version: "3.8"

networks:
  restaurant_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  airflow_logs:

services:

  # ── Zookeeper (required by Kafka) ──────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: restaurant_zookeeper
    networks:
      - restaurant_network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Apache Kafka ────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: restaurant_kafka
    networks:
      - restaurant_network
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CREATE_TOPICS: >
        orders:1:1,
        payments:1:1,
        inventory:1:1,
        feedback:1:1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── PostgreSQL Data Warehouse ───────────────────────────
  postgres:
    image: postgres:15
    container_name: restaurant_postgres
    networks:
      - restaurant_network
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: restaurant_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Cache ─────────────────────────────────────────
  redis:
    image: redis:7.2
    container_name: restaurant_redis
    networks:
      - restaurant_network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Apache Airflow ──────────────────────────────────────
  airflow:
    image: apache/airflow:2.8.0
    container_name: restaurant_airflow
    networks:
      - restaurant_network
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/restaurant_db
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "restaurant_secret_key_2025"
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: >
      bash -c "airflow db init &&
               airflow users create
                 --username admin
                 --password admin
                 --firstname Swayam
                 --lastname Padhy
                 --role Admin
                 --email swayam@kiit.ac.in &&
               airflow webserver & airflow scheduler"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Grafana Dashboard ───────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    container_name: restaurant_grafana
    networks:
      - restaurant_network
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── FastAPI ─────────────────────────────────────────────
  fastapi:
    image: python:3.11-slim
    container_name: restaurant_fastapi
    networks:
      - restaurant_network
    ports:
      - "8000:8000"
    volumes:
      - ../api:/app
      - ../requirements.txt:/requirements.txt
    working_dir: /app
    command: >
      bash -c "pip install -r /requirements.txt &&
               uvicorn app:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      postgres:
        condition: service_healthy
